# Deterministic dataset registry for training data preparation.
# Update `raw_dir` to your actual storage location and toggle `enabled`.
#
# Usage:
#   uv run python scripts/prepare_datasets.py --config configs/datasets.yaml --device cuda

cache_dir: data/cache
split: train

datasets:
  vctk:
    type: vctk
    enabled: false
    language: en
    raw_dir: data/raw

  tsukuyomi:
    type: tsukuyomi
    enabled: false
    language: ja
    raw_dir: data/raw/tsukuyomi/corpus1

  jvs:
    type: jvs
    enabled: false
    language: ja
    raw_dir: data/raw/jvs_corpus

  libritts_r:
    type: libritts_r
    enabled: false
    language: en
    raw_dir: data/raw/libritts_r

  # --- TTS Datasets ---
  jsut:
    enabled: false
    raw_dir: data/raw/jsut_ver1.1
    type: tts
    language: ja
    speakers: 1
    hours: 10

  ljspeech:
    enabled: false
    raw_dir: data/raw/LJSpeech-1.1
    type: tts
    language: en
    speakers: 1
    hours: 24

  # --- Emotion / Expressive Datasets ---
  jvnv:
    enabled: false
    raw_dir: data/raw/jvnv
    type: emotion
    language: ja
    speakers: 4
    hours: 4

  expresso:
    enabled: false
    raw_dir: data/raw/expresso
    type: emotion
    language: en
    speakers: 4
    hours: 40

  emov_db:
    enabled: false
    raw_dir: data/raw/EmoV-DB
    type: emotion
    language: en
    speakers: 4
    hours: 7

  ravdess:
    enabled: false
    raw_dir: data/raw/ravdess
    type: emotion
    language: en
    speakers: 24
    hours: 2

  # --- Bulk voice data (flat directory, clustered by speaker) ---
  galge:
    type: generic
    enabled: false
    language: ja
    raw_dir: data/raw/galge_clean
    # For flat input with speaker clustering:
    # raw_dir: data/raw/galge_voices
    # speaker_map: data/raw/galge_voices/_speaker_map.json

  # --- User-defined (generic adapter) ---
  custom_speaker:
    type: generic
    raw_dir: data/wav
    language: ja
    enabled: true
