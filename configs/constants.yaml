# TMRVC UCLM v2 Shared Constants
# Single source of truth for Unified Codec Language Model architecture.

# --- Audio Processing ---
sample_rate: 24000
n_fft: 1024
hop_length: 240          # 10ms @ 24kHz (Strict UCLM v2 requirement)
window_length: 960        # 40ms @ 24kHz
n_mels: 80
mel_fmin: 0.0
mel_fmax: 12000.0
n_freq_bins: 513
log_floor: 1.0e-10

# --- Model Dimensions ---
d_model: 512              # UCLM Transformer core dimension
d_content: 256            # Content feature dimension (ContentVec)
d_content_vec: 768        # ContentVec output dimension
d_speaker: 192            # Global speaker embedding dimension
d_f0: 2                   # F0 conditioning: [log_f0_norm, pitch_shift]

# --- UCLM v2 Token Spec ---
n_codebooks: 8            # Acoustic stream (A_t) codebooks
rvq_vocab_size: 1024      # Acoustic vocabulary size
control_slots: 4          # Control stream (B_t) slots [op, type, dur, int]
control_vocab_size: 64    # Control vocabulary size

# --- Voice State (8-dim Physical Style) ---
d_voice_state: 8          # breathiness, tension, arousal, valence, roughness, voicing, energy, rate
d_voice_state_explicit: 8 # Same as d_voice_state (explicit parameters)
d_voice_state_ssl: 128    # WavLM latent context dimension

# --- VQ Bottleneck (Content Extraction) ---
uclm_vq_bins: 128         # VQ codebook size for VC Encoder
codebook_dim: 128         # Per-codebook embedding dimension
latent_dim: 512            # Encoder output dimension

# --- Encoder/Decoder State ---
enc_state_dim: 512
enc_state_frames: 32
dec_state_dim: 256
dec_state_frames: 32
d_event_trace: 64

# --- Lookahead / HQ Mode ---
max_lookahead_hops: 6
hq_threshold_q: 0.3

# --- Text / TTS ---
d_text_encoder: 256       # Text encoder hidden dimension
n_text_encoder_layers: 6
n_text_encoder_heads: 4
text_encoder_ff_dim: 1024
phoneme_vocab_size: 200   # Unified IPA phoneme vocabulary
n_languages: 4            # ja, en, zh, ko
n_voice_source_params: 8  # Legacy: voice source parameters (for .tmrvc_character compat)
n_acoustic_params: 32     # Voice source + IR parameters
d_style: 32               # Style embedding dimension
n_style_params: 64        # Number of style parameters

# --- LoRA (for Speaker Personalization) ---
lora_rank: 4
lora_alpha: 8
# lora_delta_size is now calculated based on UCLM core layers (updated implementation)
lora_delta_size: 32768    # 12 layers x (d_model * rank * 2) approx

# --- Scene State Latent (Dialogue Context) ---
d_scene_state: 64         # Context predictor summary dimension

# --- Training / Inference ---
uclm_n_heads: 8
uclm_n_layers: 12
uclm_dropout: 0.1
uclm_max_seq_len: 2048
uclm_context_frames: 200  # 2.0 sec rolling context
uclm_block_size: 4        # 40ms streaming step

# --- F0 Conditioning ---
f0_smoothing_frames: 5
